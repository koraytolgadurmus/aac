name: Quality Gate

on:
  push:
  pull_request:

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      GH_ADMIN_TOKEN: ${{ secrets.GH_ADMIN_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.35.0"
          channel: stable
          cache: true

      - name: Install PlatformIO
        run: pip install platformio

      - name: Install preflight deps
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Flutter analyze
        run: |
          cd app
          flutter pub get
          flutter analyze lib/main.dart

      - name: Cloud preflight
        run: ./scripts/aws/release-preflight.sh

      - name: Dependency audit
        env:
          AUDIT_FAIL_LEVEL: high
        run: ./scripts/qa/dependency_audit.sh

      - name: Secret scan
        run: ./scripts/aws/secret-scan.sh

      - name: Version policy check
        run: ./scripts/qa/version_policy_check.sh

      - name: Generate SBOM
        run: python3 scripts/qa/generate_sbom.py

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: docs/audit/sbom/latest-sbom.json

      - name: Build firmware (legacy)
        run: platformio run -e esp32dev_board_legacy

      - name: Build firmware (aux)
        run: platformio run -e esp32dev_board_aux

      - name: Branch protection policy check (optional)
        if: ${{ env.GH_ADMIN_TOKEN != '' }}
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ env.GH_ADMIN_TOKEN }}
          GH_BRANCH: main
        run: ./scripts/qa/check_branch_protection.sh
