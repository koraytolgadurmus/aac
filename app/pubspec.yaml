name: artaircleaner
description: ArtAirCleaner mobile app (Flutter)
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.9.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_appauth: ^11.0.0
  http: ^1.2.2
  shared_preferences: ^2.2.3
  flutter_blue_plus: ^1.32.7
  multicast_dns: ^0.3.2
  permission_handler: ^12.0.1
  flutter_secure_storage: ^9.2.2
  path_provider: ^2.1.4
  flutter_svg: ^2.0.11
  typed_data: ^1.3.2
  sleek_circular_slider: ^2.0.1
  mobile_scanner: ^7.1.4
  qr_flutter: ^4.1.0
  share_plus: ^10.0.2
  url_launcher: ^6.3.0
  pointycastle: ^3.9.1
  crypto: ^3.0.2
dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/i18n/
    - assets/images/
    - assets/icons/
