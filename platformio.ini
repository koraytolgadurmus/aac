; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
monitor_dir = monitor

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
board_build.partitions = partitions_ota_4m.csv
build_unflags =
	-fexceptions
extra_scripts =
	pre:scripts/pio/generate_secrets_header.py
	pre:scripts/pio/enforce_product_profile.py
lib_deps = 
	h2zero/NimBLE-Arduino @ ^1.4.3
	bblanchon/ArduinoJson @ ^7
	adafruit/DHT sensor library @ ^1.4.6
	adafruit/Adafruit Unified Sensor @ ^1.1.14
	adafruit/Adafruit NeoPixel @ ^1.12.3
	https://github.com/Sensirion/arduino-i2c-sen5x.git
	adafruit/Adafruit BME680 Library @ ^2.0.4
	boschsensortec/BME68x Sensor library@^1.3.40408
	unit-electronics-mx/BME68x_UNIT_Electronics@^1.4.0
	boschsensortec/bsec2@^1.10.2610
	knolleary/PubSubClient @ ^2.8.0
build_flags = 
	-DARDUINO_USB_MODE=0
	-DCORE_DEBUG_LEVEL=0
	-DPRODUCTION_BUILD=1
	-DENABLE_CLOUD=1
	-DDEVICE_PRODUCT=\"aac\"
	-DDEVICE_HW_REV=\"v1\"
	-DDEVICE_BOARD_REV=\"esp32dev\"
	-DDEVICE_FW_CHANNEL=\"stable\"
	-DHTTP_DIAG_LOG=0
	-DENABLE_IR_RX_DEBUG=1
	-DCONFIG_BT_NIMBLE_ROLE_CENTRAL_DISABLED=1
	-DCONFIG_BT_NIMBLE_ROLE_OBSERVER_DISABLED=1
	-DCONFIG_BT_NIMBLE_MAX_CONNECTIONS=1
	-DENABLE_IR_DANGEROUS_COMBOS=0
	-DENABLE_IR_FACTORY_RESET_COMBO=1
	-DLIGHT_RELAY_INVERT=1
	-DION_RELAY_INVERT=0
	-DWATER_RELAY_INVERT=1
	-DPIN_FAN_PWM_GPIO=23
	-DPIN_FAN_TACH_GPIO=12
	-DPIN_FAN_AUX_EN_GPIO=255
	-DFAN_AUX_EN_ACTIVE_HIGH=1
	-DFAN_PWM_MIRROR_ALT_ENABLE=1
	-DFAN_PWM_MIRROR_ALT_GPIO=5
	-fno-exceptions
	; Secrets are injected at build-time by scripts/pio/generate_secrets_header.py
	; using environment variables (never commit plaintext secrets):
	; WAQI_API_TOKEN
	; AWS_IOT_ENDPOINT
	; AWS_IOT_PORT
	; AWS_IOT_ROOT_CA_PEM
	; AWS_IOT_DEVICE_CERT_PEM
	; AWS_IOT_PRIVATE_KEY_PEM
	; AWS_IOT_CLAIM_CERT_PEM
	; AWS_IOT_CLAIM_PRIVATE_KEY_PEM
	; New board I2C overrides for SEN55/BME688.
	; OTA target identity (override per hardware/product build):
	; -DDEVICE_PRODUCT=\"aac\"             ; or \"doa\"
	; -DDEVICE_HW_REV=\"v1\"
	; -DDEVICE_BOARD_REV=\"esp32dev\"
	; -DDEVICE_FW_CHANNEL=\"stable\"       ; stable/beta/dev
	; If the new PCB routes SDA1/SCL1 to different ESP32 pins,
	; set them here before upload.
	; -DPIN_I2C_SDA_GPIO=21
	; -DPIN_I2C_SCL_GPIO=22
	; Fan tach debug overrides (gerekirse aç):
	; New board fan defaults:
	; -DPIN_FAN_PWM_GPIO=23
	; -DFAN_PWM_MIRROR_ALT_ENABLE=1
	; -DFAN_PWM_MIRROR_ALT_GPIO=5
	; -DPIN_FAN_TACH_GPIO=12
	; -DPIN_FAN_AUX_EN_GPIO=255
	; -DFAN_TACH_EDGE=FALLING
	; -DFAN_TACH_PPR=2
	; -DFAN_AUX_EN_ACTIVE_HIGH=1
	; -DPWM_FREQ_FAN=25000
monitor_speed = 115200
; Daha hızlı upload (sorun olursa 230400'a düşürülebilir)
upload_speed = 460800
; Upload/erase sonrası kesin reset (boot loglarını kaçırmamak için)
upload_flags =
	--before=default_reset
	--after=hard_reset

; Serial monitor açılınca otomatik reset + boot loglarını gör
monitor_filters =
	default
	esp32_autoreset

; Development profile (non-production):
; keeps production defaults but allows local TCP command channel for bench/debug use.
[env:esp32dev_devprofile]
extends = env:esp32dev
build_unflags =
	-DPRODUCTION_BUILD=1
build_flags =
	${env:esp32dev.build_flags}
	-DPRODUCTION_BUILD=0
	-DENABLE_TCP_CMD=1

; Production board profile A (legacy fan routing)
; Use for boards where fan PWM is on GPIO23 and AUX_EN is not wired.
[env:esp32dev_board_legacy]
extends = env:esp32dev
build_unflags =
	-DDEVICE_BOARD_REV=\"esp32dev\"
build_flags =
	${env:esp32dev.build_flags}
	-DDEVICE_BOARD_REV=\"esp32dev-legacy\"

; Production board profile B (new fan routing)
; Use for boards where fan PWM is on GPIO17 and AUX_EN is on GPIO23.
[env:esp32dev_board_aux]
extends = env:esp32dev
build_unflags =
	-DDEVICE_BOARD_REV=\"esp32dev\"
	-DPIN_FAN_PWM_GPIO=23
	-DPIN_FAN_TACH_GPIO=12
	-DPIN_FAN_AUX_EN_GPIO=255
	-DFAN_PWM_MIRROR_ALT_ENABLE=1
	-DFAN_PWM_MIRROR_ALT_GPIO=5
build_flags =
	${env:esp32dev.build_flags}
	-DDEVICE_BOARD_REV=\"esp32dev-aux\"
	-DPIN_FAN_PWM_GPIO=17
	-DPIN_FAN_TACH_GPIO=12
	-DPIN_FAN_AUX_EN_GPIO=23
	-DFAN_PWM_MIRROR_ALT_ENABLE=0

; Production DOA profile
; Uses identical hardware defaults, but canonical firmware product identity is "doa".
; Build/upload:
;   pio run -e esp32dev_doa -t upload
[env:esp32dev_doa]
extends = env:esp32dev
build_unflags =
	-DDEVICE_PRODUCT=\"aac\"
	-DDEVICE_BOARD_REV=\"esp32dev\"
build_flags =
	${env:esp32dev.build_flags}
	-DDEVICE_PRODUCT=\"doa\"
	-DDEVICE_BOARD_REV=\"esp32dev-doa\"

; Eğer auto-boot (DTR/RTS) çalışmıyorsa bu environment ile BOOT'a basılı tutarak
; manuel upload/erase deneyebilirsin:
;   pio run -e esp32dev_manual -t erase
;   pio run -e esp32dev_manual -t upload
[env:esp32dev_manual]
extends = env:esp32dev
upload_flags =
	--before=no_reset
	--after=no_reset

; BLE AUTH debug (static key + verbose auth logs)
; Use only while diagnosing "invalid_signature".
; Build/upload with:
;   pio run -e esp32dev_bleauthdebug -t upload
; Monitor with:
;   pio device monitor -e esp32dev_bleauthdebug
[env:esp32dev_bleauthdebug]
extends = env:esp32dev
build_flags =
	-DARDUINO_USB_MODE=0
	-DCORE_DEBUG_LEVEL=0
	-DPRODUCTION_BUILD=0
	-DBLE_AUTH_DEBUG_STATIC_KEY=1

; Fan tach doğrulama için minimal debug.
; Upload:
;   pio run -e esp32dev_tachdebug -t upload
[env:esp32dev_sen55debug]
extends = env:esp32dev
build_flags =
	-DARDUINO_USB_MODE=0
	-DCORE_DEBUG_LEVEL=0
	-DPRODUCTION_BUILD=0
	-DSEN55_DEBUG_LOG=1
	-DI2C_SCAN_LOG=1
	-DBME688_DEBUG_LOG=1
